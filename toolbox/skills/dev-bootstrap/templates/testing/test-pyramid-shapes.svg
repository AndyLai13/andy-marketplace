<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #1a1a1a; text-anchor: middle; }
    .sub { font-size: 11px; fill: #666; text-anchor: middle; }
    .layer-label { font-size: 13px; font-weight: 600; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
    .count-label { font-size: 11px; fill: #fff; text-anchor: middle; dominant-baseline: middle; opacity: 0.9; }
    .delta-good { font-size: 12px; fill: #22b573; text-anchor: middle; font-weight: 600; }
    .delta-bad { font-size: 12px; fill: #d04040; text-anchor: middle; font-weight: 600; }
    .delta-neutral { font-size: 12px; fill: #666; text-anchor: middle; font-weight: 600; }
    .footer { font-size: 10px; fill: #888; text-anchor: middle; }
  </style>

  <!-- Outer title — replace {{PROJECT_NAME}} when adopting -->
  <text x="380" y="28" class="title">測試金字塔分布：理想 vs {{PROJECT_NAME}} 現況</text>
  <text x="380" y="46" class="sub">0 個測試 · 待第一輪測試跑完後更新</text>

  <!-- ─── LEFT: Ideal Pyramid (70/20/10) ─── -->
  <text x="190" y="86" class="title" font-size="15">理想 Pyramid</text>
  <text x="190" y="102" class="sub">70 / 20 / 10</text>

  <polygon points="50,330 330,330 290,270 90,270" fill="#22b573" />
  <text x="190" y="305" class="layer-label">Unit  70%</text>

  <polygon points="90,270 290,270 260,210 120,210" fill="#f0a020" />
  <text x="190" y="245" class="layer-label">Integration  20%</text>

  <polygon points="120,210 260,210 230,150 150,150" fill="#d04040" />
  <text x="190" y="185" class="layer-label">E2E  10%</text>

  <text x="190" y="358" class="sub">傳統 web app 經典分布</text>

  <!-- ─── RIGHT: Project target (65/30/5) — adapt counts as tests grow ─── -->
  <text x="570" y="86" class="title" font-size="15">{{PROJECT_NAME}} 目標</text>
  <text x="570" y="102" class="sub">65 / 30 / 5</text>

  <!-- Bottom: Unit 65% -->
  <polygon points="470,330 670,330 636,254 504,254" fill="#22b573" />
  <text x="570" y="298" class="layer-label">Unit  65%</text>
  <text x="570" y="316" class="count-label">0 tests</text>

  <!-- Middle: Integration 30% -->
  <polygon points="504,254 636,254 622,218 614,194 608,176 532,176 526,194 518,218" fill="#f0a020" />
  <text x="570" y="216" class="layer-label">Integration  30%</text>
  <text x="570" y="234" class="count-label">0 tests</text>

  <!-- Top: E2E 5% -->
  <polygon points="532,176 608,176 596,138 544,138" fill="#d04040" />
  <text x="570" y="158" class="layer-label">E2E  5%</text>
  <text x="570" y="168" class="count-label">0 tests</text>

  <text x="570" y="358" class="sub">BaaS Pyramid-leaning Trophy（doctrine 出處：test-strategy skill）</text>

  <!-- ─── Delta arrows between the two shapes ─── -->
  <text x="380" y="220" class="delta-neutral">+10pp</text>
  <text x="380" y="298" class="delta-neutral">−5pp</text>
  <text x="380" y="185" class="delta-good">−5pp ✓</text>

  <line x1="380" y1="120" x2="380" y2="350" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,3" />

  <!-- Footer explanation -->
  <rect x="60" y="385" width="640" height="55" fill="#fafafa" stroke="#e5e5e5" stroke-width="1" rx="4" />
  <text x="380" y="404" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">為什麼 65/30/5 是 BaaS 架構的合理形狀</text>
  <text x="380" y="422" font-size="11" fill="#444" text-anchor="middle">商業規則住在 PL/pgSQL RPC + RLS（unit 蓋不到） · 路徑短層薄 unit-testable 程式碼天生少 · vitest 直打 cloud Supabase 夠快</text>
  <text x="380" y="438" font-size="10" fill="#888" text-anchor="middle">Reference: Kent C. Dodds, "The Testing Trophy" (2018)</text>
</svg>
